name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No pnpm lockfile in repo — pnpm install generates one during
          # build. Skip cache to avoid "pnpm-lock.yaml not found" failure.
          # TODO: commit pnpm-lock.yaml to enable cache + reproducible installs.
          registry-url: https://npm.pkg.github.com
          scope: "@zeroroot"

      - run: pnpm install --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/zeroroot-ai/docs-site:${{ github.sha }}
            ghcr.io/zeroroot-ai/docs-site:main
          build-args: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

